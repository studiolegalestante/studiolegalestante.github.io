<!DOCTYPE HTML>
<html lang="it">
<head>
	<title>News Legali | Avv. Vincenzo Stante</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="assets/css/main.css" />

	<style>

		body {
			font-family: 'Inter', sans-serif;
		}

		h1,h2,h3,h4 {
			font-family: 'Cormorant Garamond', serif;
		}

		.news-grid {
			display:grid;
			grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
			gap:2rem;
		}

		.news-card {
			background:#181818;
			border:1px solid rgba(212,175,55,.18);
			border-radius:16px;
			padding:2rem;
			box-shadow:0 0 30px rgba(0,0,0,.25);
		}

		.news-item {
			padding:1rem 0;
			border-bottom:1px solid rgba(255,255,255,.08);
		}

		.news-item:last-child {
			border-bottom:none;
		}

		.news-item a {
			color:#fff;
			font-weight:600;
			font-size:1rem;
			text-decoration:none;
			border:none;
		}

		.news-item a:hover {
			color:#d4af37;
		}

		.news-date {
			display:block;
			font-size:.82rem;
			color:rgba(255,255,255,.5);
			margin-top:.4rem;
		}

		.news-desc {
			margin-top:.6rem;
			font-size:.92rem;
			color:rgba(255,255,255,.75);
			line-height:1.7;
		}

		@media screen and (max-width:736px){

			.news-grid{
				grid-template-columns:1fr;
			}

		}

	</style>

</head>

<body>

<div id="page-wrapper">

<header id="header">
	<h1><a href="index.html">Avv. Vincenzo Stante</a></h1>
</header>

<section id="wrapper">

<section class="wrapper">
<div class="inner">

	<h2 class="major">News e approfondimenti legali</h2>

	<div class="news-grid">

		<div class="news-card">
			<h3>Diritto Penale</h3>
			<div id="penale"></div>
		</div>

		<div class="news-card">
			<h3>Diritto di Famiglia</h3>
			<div id="famiglia"></div>
		</div>

		<div class="news-card">
			<h3>Patrocinio a Spese dello Stato</h3>
			<div id="patrocinio"></div>
		</div>

		<div class="news-card">
			<h3>Giurisprudenza</h3>
			<div id="giurisprudenza"></div>
		</div>

	</div>

</div>
</section>

</section>

</div>

<script>

async function loadNews() {

	const response = await fetch('data/news.json');
	const data = await response.json();

	for (const category in data) {

		const container = document.getElementById(category);

		data[category].forEach(item => {

			const div = document.createElement('div');

			div.className = 'news-item';

			div.innerHTML = `
				<a href="${item.link}" target="_blank">
					${item.title}
				</a>

				<span class="news-date">
					${item.date}
				</span>

				<div class="news-desc">
					${item.description.replace(/<[^>]*>/g,'').substring(0,180)}...
				</div>
			`;

			container.appendChild(div);

		});

	}

}

loadNews();

</script>

<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
