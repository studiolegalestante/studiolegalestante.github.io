name: Aggiorna news legali

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  # Forza l'uso di Node 24 per evitare avvisi di deprecazione (consigliato da GitHub)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: 'pip'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          # Librerie standard per web scraping e feed RSS
          pip install requests beautifulsoup4 feedparser 

      - name: Genera news.json
        run: |
          # Crea la cartella data se non esiste per evitare errori di IO
          mkdir -p data
          python scripts/fetch_news.py

      - name: Commit e Push news aggiornate
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/news.json
          # || exit 0 impedisce al workflow di fallire se non ci sono nuove news
          git commit -m "Aggiornamento automatico news legali" || exit 0
          git push
