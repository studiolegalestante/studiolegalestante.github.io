name: Aggiorna news legali

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          # Rimuovendo 'cache' qui e installando manualmente sotto, l'errore sparisce

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedparser

      - name: Genera news.json
        run: |
          mkdir -p data
          python scripts/fetch_news.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@://github.com"
          git add data/news.json
          git diff --cached --quiet || (git commit -m "Aggiornamento automatico news" && git push)

