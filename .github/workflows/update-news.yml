name: Aggiorna news legali

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Genera news.json
        run: python scripts/fetch_news.py

      - name: Commit news aggiornate
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/news.json
          git commit -m "Aggiornamento automatico news legali" || echo "Nessuna modifica"
          git push
