name: Aggiorna news legali

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # ogni giorno alle 06:00 UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4.2.2

      - name: Configura Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4 feedparser

      - name: Scarica le news
        run: |
          mkdir -p data
          python scripts/fetch_news.py

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "Nessuna modifica" || (git commit -m "Update news [skip ci]" && git push)
